<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            padding: 10px 20px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .user-data { margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <h1>Olá, <span id="user-name">Usuário</span>!</h1>
    <p>Este é um Mini App rodando dentro do Telegram.</p>
    
    <button onclick="showAlert()">Testar Alerta Nativo</button>

    <div class="user-data">
        <p>Seu ID: <span id="user-id">---</span></p>
    </div>

    <script>
        // Inicializa o WebApp
        const tg = window.Telegram.WebApp;

        // Expande o app para a tela toda
        tg.expand();

        // Pega os dados do usuário vindos do Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            document.getElementById('user-id').innerText = user.id;
        }

        // Configura o Botão Principal (Main Button) lá embaixo
        tg.MainButton.setText("ENVIAR PEDIDO");
        tg.MainButton.setTextColor("#FFFFFF");
        tg.MainButton.color = "#2ec4b6";
        tg.MainButton.show();

        // Ação ao clicar no botão de baixo
        tg.MainButton.onClick(() => {
            tg.sendData("Pedido enviado via Mini App!"); // Envia dados de volta para o bot
            tg.close(); // Fecha o mini app
        });

        function showAlert() {
            tg.showAlert("Isso é um alerta nativo do sistema!");
        }
    </script>
</body>
</html>
